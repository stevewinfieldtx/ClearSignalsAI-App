<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearSignals AI</title>
<script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e17;--surface:#111827;--surface2:#1a2235;--border:#1e293b;--text:#e2e8f0;--text-muted:#94a3b8;--accent:#3b82f6;--accent-glow:rgba(59,130,246,0.15);--green:#10b981;--amber:#f59e0b;--red:#ef4444;--radius:10px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;overflow-x:hidden}
  .header{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  .header-brand{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .header-logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:white;box-shadow:0 0 12px var(--accent-glow)}
  .header-title{font-size:15px;font-weight:700;letter-spacing:-0.3px}
  .header-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
  .mode-toggle{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-top:10px}
  .mode-btn{flex:1;padding:6px 0;text-align:center;font-size:11px;font-weight:600;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:6px;transition:all 0.2s}
  .mode-btn.active{background:var(--accent);color:white;box-shadow:0 2px 8px var(--accent-glow)}
  .content{padding:16px}
  .email-info{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:14px}
  .email-subject{font-weight:600;font-size:13px;margin-bottom:6px;line-height:1.3}
  .email-meta{display:flex;flex-wrap:wrap;gap:8px}
  .email-tag{font-size:10px;color:var(--text-muted);background:var(--bg);padding:2px 8px;border-radius:4px}
  .analyze-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#6366f1);color:white;border:none;border-radius:var(--radius);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;position:relative;overflow:hidden}
  .analyze-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow)}
  .analyze-btn:active{transform:translateY(0)}
  .analyze-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
  .loading{text-align:center;padding:32px 16px;display:none}
  .loading.visible{display:block}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:12px;color:var(--text-muted)}
  .results{display:none}.results.visible{display:block}
  .score-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
  .score-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:6px}
  .score-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;line-height:1}
  .score-value.green{color:var(--green)}.score-value.amber{color:var(--amber)}.score-value.red{color:var(--red)}
  .direction-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:600;margin-bottom:14px}
  .direction-dot{width:8px;height:8px;border-radius:50%}
  .direction-dot.inbound{background:var(--green)}.direction-dot.outbound{background:var(--accent)}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
  .section-header{padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
  .section-header::after{content:'\25BE';font-size:10px;transition:transform 0.2s}
  .section.collapsed .section-header::after{transform:rotate(-90deg)}
  .section.collapsed .section-body{display:none}
  .section-body{padding:12px}
  .signal-item{padding:8px 0;border-bottom:1px solid var(--border)}.signal-item:last-child{border-bottom:none}
  .signal-type{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:3px}
  .signal-text{font-size:12px;line-height:1.4}
  .coaching-item{padding:10px 0;border-bottom:1px solid var(--border)}.coaching-item:last-child{border-bottom:none}
  .coaching-text{font-size:12px;line-height:1.5}
  .next-step{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}.next-step:last-child{border-bottom:none}
  .step-num{flex-shrink:0;width:20px;height:20px;background:var(--accent);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
  .step-text{font-size:12px;line-height:1.4}
  .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius);padding:12px;margin-top:12px;display:none}
  .error.visible{display:block}.error-text{font-size:12px;color:var(--red)}
  .paste-section{margin-top:14px;display:none}.paste-section.visible{display:block}
  .paste-area{width:100%;min-height:120px;background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:12px;color:var(--text);font-family:inherit;font-size:12px;resize:vertical;margin-bottom:10px}
  .paste-area:focus{outline:none;border-color:var(--accent)}
  .paste-label{font-size:11px;color:var(--text-muted);margin-bottom:6px}
  .footer{padding:12px 16px;text-align:center;font-size:10px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:20px}
  .footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="header">
  <div class="header-brand">
    <div class="header-logo">CS</div>
    <div><div class="header-title">ClearSignals AI</div><div class="header-sub">Communication Intelligence</div></div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="coaching" onclick="setMode('coaching')">Coaching</button>
    <button class="mode-btn" data-mode="postmortem" onclick="setMode('postmortem')">Post-Mortem</button>
  </div>
</div>
<div class="content">
  <div class="email-info" id="emailInfo"><div class="email-subject" id="emailSubject">Loading email...</div><div class="email-meta" id="emailMeta"></div></div>
  <button class="analyze-btn" id="analyzeBtn" onclick="analyzeEmail()" disabled>Analyze This Thread</button>
  <div class="paste-section" id="pasteSection"><div class="paste-label">Or paste an email thread:</div><textarea class="paste-area" id="pasteArea" placeholder="Paste the full email thread here..."></textarea><button class="analyze-btn" onclick="analyzePasted()">Analyze Pasted Thread</button></div>
  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">Analyzing communication patterns...</div></div>
  <div class="error" id="error"><div class="error-text" id="errorText"></div></div>
  <div class="results" id="results"></div>
</div>
<div class="footer">Powered by <a href="https://clearsignalsai.com" target="_blank">ClearSignals AI</a> &middot; NYN Impact</div>
<script>
var API_BASE='https://clearsignalsai-app.up.railway.app';
var currentMode='coaching',emailData=null,officeReady=false;

Office.onReady(function(info){if(info.host===Office.HostType.Outlook){officeReady=true;loadEmailData()}else{showPasteFallback()}});
setTimeout(function(){if(!officeReady)showPasteFallback()},3000);

function showPasteFallback(){document.getElementById('emailSubject').textContent='Paste an email thread below';document.getElementById('emailMeta').innerHTML='<span class="email-tag">Manual mode</span>';document.getElementById('pasteSection').classList.add('visible');document.getElementById('analyzeBtn').style.display='none'}

function loadEmailData(){var item=Office.context.mailbox.item;var subject=item.subject||'(No subject)';document.getElementById('emailSubject').textContent=subject;var meta=document.getElementById('emailMeta');var from='';if(item.from)from=item.from.displayName||item.from.emailAddress||'';if(from)meta.innerHTML+='<span class="email-tag">From: '+esc(from)+'</span>';var date=item.dateTimeCreated;if(date)meta.innerHTML+='<span class="email-tag">'+new Date(date).toLocaleDateString()+'</span>';item.body.getAsync(Office.CoercionType.Text,function(r){if(r.status===Office.AsyncResultStatus.Succeeded){emailData={subject:subject,from:from,body:r.value};document.getElementById('analyzeBtn').disabled=false;document.getElementById('analyzeBtn').textContent='Analyze This Thread'}else{showError('Could not read email body.');showPasteFallback()}})}

function setMode(m){currentMode=m;document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mode===m)})}
function analyzeEmail(){if(!emailData)return;run(emailData.body)}
function analyzePasted(){var t=document.getElementById('pasteArea').value.trim();if(t)run(t)}

function run(text){document.getElementById('loading').classList.add('visible');document.getElementById('results').classList.remove('visible');document.getElementById('error').classList.remove('visible');document.getElementById('analyzeBtn').disabled=true;fetch(API_BASE+'/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,mode:currentMode})}).then(function(r){return r.json()}).then(function(d){document.getElementById('loading').classList.remove('visible');document.getElementById('analyzeBtn').disabled=false;if(d.error){showError(d.error);return}render(d)}).catch(function(e){document.getElementById('loading').classList.remove('visible');document.getElementById('analyzeBtn').disabled=false;showError('Analysis failed: '+e.message)})}

function render(data){var c=document.getElementById('results'),h='',a=data.result||data.analysis||data,f=a.final||{};
var intent=f.intent||a.intent_score||'--',win=f.win_pct||a.win_probability||'--';
var iN=parseInt(intent)||0,wN=parseInt(win)||0;
h+='<div class="score-row"><div class="score-card"><div class="score-label">Buyer Intent</div><div class="score-value '+sc(iN,10)+'">'+intent+'<span style="font-size:14px;color:var(--text-muted)">/10</span></div></div><div class="score-card"><div class="score-label">Win Probability</div><div class="score-value '+sc(wN,100)+'">'+win+'<span style="font-size:14px;color:var(--text-muted)">%</span></div></div></div>';
var dir=f.deal_health||f.trajectory||'';if(dir)h+='<div class="direction-badge"><span class="direction-dot '+(dir==='healthy'||dir==='improving'?'inbound':'outbound')+'"></span>'+esc(dir)+'</div>';
var sigs=f.signals||a.signals||[];if(sigs.length){h+='<div class="section"><div class="section-header" onclick="tog(this)">Signals Detected</div><div class="section-body">';sigs.forEach(function(s){var t=typeof s==='string'?s:(s.desc||s.signal||s.text||JSON.stringify(s));var tp=typeof s==='object'?(s.type||s.severity||''):'';h+='<div class="signal-item">';if(tp)h+='<div class="signal-type">'+esc(tp)+'</div>';h+='<div class="signal-text">'+esc(t)+'</div></div>'});h+='</div></div>'}
var coach=f.coach?[{text:f.coach}]:(a.coaching||[]);if(coach.length){h+='<div class="section"><div class="section-header" onclick="tog(this)">Coaching</div><div class="section-body">';coach.forEach(function(c){var t=typeof c==='string'?c:(c.text||c.advice||c.coaching||JSON.stringify(c));h+='<div class="coaching-item"><div class="coaching-text">'+esc(t)+'</div></div>'});h+='</div></div>'}
var steps=f.recommended_actions||f.next_steps||[];if(steps.length){h+='<div class="section"><div class="section-header" onclick="tog(this)">Next Steps</div><div class="section-body">';steps.forEach(function(s,i){var t=typeof s==='string'?s:(s.action||s.step||s.text||JSON.stringify(s));var r=typeof s==='object'&&s.reasoning?' <span style="color:var(--text-muted);font-size:11px">('+esc(s.reasoning)+')</span>':'';h+='<div class="next-step"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+esc(t)+r+'</div></div>'});h+='</div></div>'}
var sum=f.summary||a.summary||'';if(sum){h+='<div class="section"><div class="section-header" onclick="tog(this)">Summary</div><div class="section-body"><div style="font-size:12px;line-height:1.6">'+esc(sum)+'</div></div></div>'}
var pe=a.per_email||[];if(pe.length){h+='<div class="section collapsed"><div class="section-header" onclick="tog(this)">Email-by-Email ('+pe.length+')</div><div class="section-body">';pe.forEach(function(e,i){h+='<div class="signal-item"><div class="signal-type">Email '+(i+1)+'</div>';var t=e.summary||'';if(t)h+='<div class="signal-text">'+esc(t)+'</div>';if(e.intent)h+='<div style="margin-top:4px;font-size:10px;color:var(--text-muted)">Intent: '+e.intent+' | Win: '+(e.win_pct||'--')+'%</div>';h+='</div>'});h+='</div></div>'}
c.innerHTML=h;c.classList.add('visible')}

function sc(v,m){var p=(v/m)*100;return p>=65?'green':p>=35?'amber':'red'}
function tog(el){el.parentElement.classList.toggle('collapsed')}
function showError(m){var e=document.getElementById('error');document.getElementById('errorText').textContent=m;e.classList.add('visible')}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
</script>
</body>
</html>
